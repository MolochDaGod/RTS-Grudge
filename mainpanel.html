<!doctype html>
<html lang="en">

<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Grudge Warlords • Main Panel</title>
  <link
    href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700;900&family=Crimson+Text:ital,wght@0,400;0,600;0,700;1,400&family=JetBrains+Mono:wght@400;700&display=swap"
    rel="stylesheet" />
  <style>
    :root {
      --bg: #0a0705;
      --panel: #1a120c;
      --panel2: #221710;
      --panel3: #2e1f14;
      --border: #c9950a;
      --border2: #7a5c1e;
      --border-dim: #3a2a1a;
      --text: #f5e2c1;
      --muted: #9b7d52;
      --dim: #6b5535;
      --gold: #d4a400;
      --gold-glow: rgba(212, 164, 0, .25);
      --green: #6ec96e;
      --red: #d45050;
      --blue: #5a9ad8;
      --purple: #a87ddb;
      --orange: #d89040;
      --cyan: #50b8c0;
      --slot: #1e140e;
      --slot-b: #3a2a1a;
      --shadow: 0 6px 24px rgba(0, 0, 0, .6);
      --font-display: 'Cinzel', serif;
      --font-body: 'Crimson Text', Georgia, serif;
      --font-mono: 'JetBrains Mono', monospace;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0
    }

    html,
    body {
      height: 100%;
      overflow: hidden
    }

    body {
      font-family: var(--font-body);
      color: var(--text);
      background:
        radial-gradient(ellipse 900px 400px at 10% 0%, rgba(212, 164, 0, .06), transparent),
        radial-gradient(ellipse 700px 500px at 90% 100%, rgba(140, 40, 20, .06), transparent),
        linear-gradient(170deg, #120c06 0%, #0a0705 40%, #080604 100%);
    }

    ::-webkit-scrollbar {
      width: 6px;
      height: 6px
    }

    ::-webkit-scrollbar-thumb {
      background: #3a2a1a;
      border-radius: 9px
    }

    ::-webkit-scrollbar-track {
      background: transparent
    }

    /* ═══ LAYOUT ═══ */
    .app {
      display: flex;
      height: 100vh;
      flex-direction: column
    }

    .top-bar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 8px 16px;
      background: linear-gradient(90deg, #1a100a, #221710, #1a100a);
      border-bottom: 2px solid var(--border);
      box-shadow: 0 2px 12px rgba(0, 0, 0, .5);
      flex-shrink: 0;
    }

    .logo {
      display: flex;
      align-items: center;
      gap: 10px
    }

    .logo h1 {
      font-family: var(--font-display);
      font-size: 15px;
      color: var(--gold);
      letter-spacing: 2px;
      text-transform: uppercase
    }

    .logo .sub {
      font-size: 11px;
      color: var(--muted)
    }

    .player-info {
      display: flex;
      align-items: center;
      gap: 14px;
      font-size: 12px
    }

    .player-info .name {
      color: var(--gold);
      font-family: var(--font-display);
      font-weight: 700
    }

    .player-info .lvl {
      color: var(--muted);
      font-size: 11px
    }

    .resource-bars {
      display: flex;
      gap: 8px
    }

    .res-bar {
      width: 120px;
      height: 14px;
      background: #1a0f08;
      border: 1px solid var(--border-dim);
      border-radius: 3px;
      overflow: hidden;
      position: relative
    }

    .res-bar .fill {
      height: 100%;
      border-radius: 2px;
      transition: width .4s
    }

    .res-bar .fill.hp {
      background: linear-gradient(90deg, #8b2020, #d44040);
      width: 78%
    }

    .res-bar .fill.mp {
      background: linear-gradient(90deg, #1a3a6a, #3a7ad8);
      width: 62%
    }

    .res-bar .fill.sp {
      background: linear-gradient(90deg, #5a6a1a, #9ab830);
      width: 91%
    }

    .res-bar .lbl {
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      text-align: center;
      font-size: 9px;
      font-family: var(--font-mono);
      line-height: 14px;
      color: #fff;
      text-shadow: 0 1px 2px #000
    }

    .main-body {
      display: flex;
      flex: 1;
      min-height: 0
    }

    /* ═══ LEFT: STATS + CHAR ═══ */
    .left-col {
      width: 260px;
      flex-shrink: 0;
      background: linear-gradient(180deg, #1a120c, #140e08);
      border-right: 2px solid var(--border-dim);
      display: flex;
      flex-direction: column;
      overflow-y: auto;
    }

    .char-preview {
      height: 200px;
      background: radial-gradient(circle at 50% 60%, rgba(212, 164, 0, .08), transparent 70%),
        linear-gradient(180deg, #0f0a06, #1a120c);
      border-bottom: 1px solid var(--border-dim);
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
    }

    .char-silhouette {
      width: 120px;
      height: 170px;
      background: radial-gradient(ellipse at 50% 40%, rgba(200, 160, 80, .12), transparent 60%);
      border: 2px dashed var(--border-dim);
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--dim);
      font-size: 11px;
      font-family: var(--font-display);
      text-transform: uppercase;
      letter-spacing: 1px;
    }

    .stat-section {
      padding: 10px 12px
    }

    .stat-section h3 {
      font-family: var(--font-display);
      font-size: 11px;
      color: var(--gold);
      text-transform: uppercase;
      letter-spacing: 1.5px;
      border-bottom: 1px solid var(--gold-glow);
      padding-bottom: 4px;
      margin-bottom: 6px;
    }

    .stat-row {
      display: flex;
      justify-content: space-between;
      padding: 4px 0;
      font-size: 12px;
      border-bottom: 1px solid rgba(255, 255, 255, .03)
    }

    .stat-row .k {
      color: var(--muted);
      font-weight: 600
    }

    .stat-row .v {
      color: var(--text);
      font-family: var(--font-mono);
      font-size: 11px
    }

    .stat-row .v.green {
      color: var(--green)
    }

    /* ═══ CENTER: TABS + CONTENT ═══ */
    .center-col {
      flex: 1;
      display: flex;
      flex-direction: column;
      min-width: 0
    }

    .tab-strip {
      display: flex;
      gap: 0;
      background: linear-gradient(90deg, #14100a, #1e150e, #14100a);
      border-bottom: 2px solid var(--border);
      flex-shrink: 0;
      overflow-x: auto;
    }

    .tab-btn {
      border: 0;
      background: transparent;
      color: var(--muted);
      cursor: pointer;
      padding: 10px 14px;
      font-family: var(--font-display);
      font-size: 10px;
      text-transform: uppercase;
      letter-spacing: 1px;
      font-weight: 700;
      border-bottom: 2px solid transparent;
      white-space: nowrap;
      transition: .15s;
    }

    .tab-btn:hover {
      color: var(--text);
      background: rgba(212, 164, 0, .05)
    }

    .tab-btn.active {
      color: var(--gold);
      border-bottom-color: var(--gold);
      background: rgba(212, 164, 0, .08)
    }

    .content-area {
      flex: 1;
      overflow-y: auto;
      padding: 16px
    }

    .tab-panel {
      display: none
    }

    .tab-panel.active {
      display: block
    }

    /* ═══ RIGHT: INVENTORY ═══ */
    .right-col {
      width: 280px;
      flex-shrink: 0;
      background: linear-gradient(180deg, #1a120c, #140e08);
      border-left: 2px solid var(--border-dim);
      display: flex;
      flex-direction: column;
    }

    .inv-header {
      padding: 10px 12px;
      border-bottom: 1px solid var(--border-dim);
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .inv-header h3 {
      font-family: var(--font-display);
      font-size: 12px;
      color: var(--gold);
      text-transform: uppercase;
      letter-spacing: 1px
    }

    .inv-header .gold-display {
      font-family: var(--font-mono);
      font-size: 12px;
      color: #ffd56a
    }

    .inv-grid {
      display: grid;
      grid-template-columns: repeat(6, 1fr);
      gap: 4px;
      padding: 8px;
      flex: 1;
      overflow-y: auto;
      align-content: start;
    }

    .inv-cell {
      aspect-ratio: 1;
      border: 2px solid var(--border-dim);
      border-radius: 6px;
      background: linear-gradient(135deg, #221710, #1a0f08);
      cursor: pointer;
      transition: .15s;
      position: relative;
    }

    .inv-cell:hover {
      border-color: var(--gold);
      box-shadow: 0 0 8px var(--gold-glow)
    }

    .inv-cell.filled {
      border-color: #5a4020
    }

    .inv-cell .item-icon {
      width: 100%;
      height: 100%;
      object-fit: contain;
      padding: 4px
    }

    .inv-cell .qty {
      position: absolute;
      bottom: 1px;
      right: 3px;
      font-size: 9px;
      font-family: var(--font-mono);
      color: var(--gold)
    }

    .trash-zone {
      padding: 8px 12px;
      border-top: 1px solid var(--border-dim);
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .trash-slot {
      width: 40px;
      height: 40px;
      border: 2px dashed var(--red);
      border-radius: 6px;
      background: rgba(200, 40, 40, .08);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 16px;
      color: var(--red);
    }

    .trash-zone span {
      font-size: 11px;
      color: var(--muted)
    }

    /* ═══ BOTTOM BAR ═══ */
    .bottom-bar {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 20px;
      padding: 6px 16px;
      background: linear-gradient(90deg, #120c06, #1a120c, #120c06);
      border-top: 2px solid var(--border);
      flex-shrink: 0;
    }

    .hotbar {
      display: flex;
      gap: 4px
    }

    .hb-slot {
      width: 44px;
      height: 44px;
      border: 2px solid var(--border-dim);
      border-radius: 6px;
      background: linear-gradient(135deg, #2a1e14, #1a0f08);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 9px;
      color: var(--dim);
      font-family: var(--font-mono);
      cursor: pointer;
      transition: .15s;
      position: relative;
    }

    .hb-slot:hover {
      border-color: var(--gold)
    }

    .hb-slot .key {
      position: absolute;
      top: 2px;
      left: 4px;
      font-size: 8px;
      color: var(--muted)
    }

    /* ═══ SHARED COMPONENTS ═══ */
    .section-title {
      display: flex;
      align-items: center;
      gap: 8px;
      font-family: var(--font-display);
      font-size: 12px;
      color: var(--gold);
      text-transform: uppercase;
      letter-spacing: 1px;
      margin: 16px 0 10px;
    }

    .section-title::before {
      content: '';
      width: 3px;
      height: 14px;
      background: var(--gold);
      border-radius: 3px
    }

    .card {
      background: linear-gradient(135deg, #221710, #1a0f08);
      border: 1px solid var(--border-dim);
      border-radius: 10px;
      padding: 12px;
      box-shadow: var(--shadow);
      transition: .15s;
    }

    .card:hover {
      border-color: var(--border2);
      transform: translateY(-1px)
    }

    /* Equipment Panel */
    .equip-layout {
      display: grid;
      grid-template-columns: 80px 1fr 80px;
      gap: 16px;
      align-items: center;
      max-width: 500px;
      margin: 0 auto
    }

    .equip-stack {
      display: flex;
      flex-direction: column;
      gap: 10px;
      align-items: center
    }

    .eq-slot {
      width: 72px;
      height: 72px;
      border: 2px solid var(--border);
      border-radius: 8px;
      background: linear-gradient(135deg, #2e1f14, #1a0f08);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      transition: .15s;
    }

    .eq-slot:hover {
      border-color: var(--gold);
      box-shadow: 0 0 12px var(--gold-glow)
    }

    .eq-slot .cat {
      font-size: 8px;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: .5px;
      font-family: var(--font-display)
    }

    .eq-center {
      width: 140px;
      height: 140px;
      border: 3px solid var(--border);
      border-radius: 12px;
      background: radial-gradient(circle, rgba(212, 164, 0, .08), transparent 70%), linear-gradient(135deg, #2e1f14, #1a0f08);
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto;
      font-family: var(--font-display);
      font-size: 10px;
      color: var(--muted);
      text-transform: uppercase;
    }

    /* Attributes Panel */
    .attr-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
      gap: 10px
    }

    .attr-card {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 10px;
      background: linear-gradient(135deg, #1e1510, #160e08);
      border: 1px solid var(--border-dim);
      border-radius: 8px;
    }

    .attr-icon {
      width: 40px;
      height: 40px;
      border-radius: 8px;
      background: radial-gradient(circle, rgba(212, 164, 0, .15), transparent);
      border: 1px solid var(--border2);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 18px;
      flex-shrink: 0;
    }

    .attr-info .name {
      font-size: 12px;
      font-weight: 700;
      color: var(--text)
    }

    .attr-info .val {
      font-size: 18px;
      font-family: var(--font-mono);
      color: var(--gold);
      font-weight: 700
    }

    .attr-info .desc {
      font-size: 10px;
      color: var(--muted);
      margin-top: 2px
    }

    .attr-btn {
      margin-left: auto;
      width: 24px;
      height: 24px;
      border-radius: 4px;
      border: 1px solid var(--green);
      background: rgba(110, 200, 110, .1);
      color: var(--green);
      cursor: pointer;
      font-size: 14px;
      font-weight: 700;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }

    .attr-btn:hover {
      background: rgba(110, 200, 110, .25)
    }

    /* Skill Trees */
    .tree-selector {
      display: flex;
      gap: 6px;
      margin-bottom: 14px;
      flex-wrap: wrap
    }

    .tree-btn {
      padding: 6px 12px;
      border: 1px solid var(--border-dim);
      border-radius: 6px;
      background: var(--panel);
      color: var(--muted);
      cursor: pointer;
      font-family: var(--font-display);
      font-size: 10px;
      text-transform: uppercase;
      letter-spacing: .5px;
      transition: .15s;
    }

    .tree-btn:hover {
      border-color: var(--border2);
      color: var(--text)
    }

    .tree-btn.active {
      border-color: var(--gold);
      color: var(--gold);
      background: rgba(212, 164, 0, .1)
    }

    .skill-tier {
      margin-bottom: 16px
    }

    .tier-label {
      font-size: 10px;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 1.2px;
      font-weight: 700;
      margin-bottom: 8px;
      font-family: var(--font-display)
    }

    .skill-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
      gap: 8px
    }

    .skill-node {
      display: flex;
      gap: 8px;
      padding: 10px;
      background: linear-gradient(135deg, #1e1710, #160f08);
      border: 1px solid var(--border-dim);
      border-radius: 10px;
      cursor: pointer;
      transition: .15s;
    }

    .skill-node:hover {
      border-color: var(--border2);
      transform: translateY(-1px)
    }

    .skill-node.unlocked {
      border-color: #4a7a30;
      background: linear-gradient(135deg, #1a2810, #142008)
    }

    .skill-node.locked {
      opacity: .5
    }

    .skill-node .sk-icon {
      width: 36px;
      height: 36px;
      border-radius: 8px;
      flex-shrink: 0;
      background: radial-gradient(circle, rgba(212, 164, 0, .12), transparent);
      border: 1px solid var(--border-dim);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 18px;
    }

    .skill-node .sk-name {
      font-size: 11px;
      font-weight: 700;
      color: var(--text)
    }

    .skill-node .sk-desc {
      font-size: 10px;
      color: var(--muted);
      line-height: 1.3;
      margin-top: 2px
    }

    .skill-node .sk-meta {
      display: flex;
      gap: 4px;
      margin-top: 5px;
      flex-wrap: wrap
    }

    .chip {
      font-size: 8px;
      font-weight: 800;
      text-transform: uppercase;
      letter-spacing: .4px;
      border: 1px solid;
      border-radius: 99px;
      padding: 1px 6px;
    }

    .chip.dmg {
      color: #ff8b95;
      border-color: #ff8b9540;
      background: #ff8b9510
    }

    .chip.cd {
      color: #84b2ff;
      border-color: #84b2ff40;
      background: #84b2ff10
    }

    .chip.heal {
      color: #6ec96e;
      border-color: #6ec96e40;
      background: #6ec96e10
    }

    .chip.buff {
      color: #ffd56a;
      border-color: #ffd56a40;
      background: #ffd56a10
    }

    .chip.cc {
      color: #a87ddb;
      border-color: #a87ddb40;
      background: #a87ddb10
    }

    .chip.ult {
      color: #ff9d4d;
      border-color: #ff9d4d40;
      background: #ff9d4d10
    }

    /* Class badges */
    .class-badge {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      padding: 2px 8px;
      border-radius: 99px;
      font-size: 9px;
      font-weight: 800;
      text-transform: uppercase;
      letter-spacing: .5px;
      border: 1px solid;
    }

    .class-badge.warrior {
      color: #ff7d87;
      border-color: #ff7d8740;
      background: #ff7d8712
    }

    .class-badge.mage {
      color: #bb95ff;
      border-color: #bb95ff40;
      background: #bb95ff12
    }

    .class-badge.ranger {
      color: #49de95;
      border-color: #49de9540;
      background: #49de9512
    }

    .class-badge.worge {
      color: #ffb16d;
      border-color: #ffb16d40;
      background: #ffb16d12
    }

    /* Crafting */
    .craft-layout {
      display: grid;
      grid-template-columns: 1fr auto 1fr;
      gap: 16px;
      align-items: start;
      max-width: 600px;
      margin: 0 auto
    }

    .craft-slots {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 8px
    }

    .craft-slot {
      width: 64px;
      height: 64px;
      border: 2px solid var(--border-dim);
      border-radius: 8px;
      background: linear-gradient(135deg, #221710, #1a0f08);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 9px;
      color: var(--dim);
      cursor: pointer;
    }

    .craft-arrow {
      font-size: 28px;
      color: var(--gold);
      align-self: center
    }

    .craft-result {
      width: 80px;
      height: 80px;
      border: 3px solid var(--border);
      border-radius: 10px;
      background: radial-gradient(circle, rgba(212, 164, 0, .1), transparent), linear-gradient(135deg, #2e1f14, #1a0f08);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 10px;
      color: var(--muted);
    }

    .craft-btn {
      grid-column: 1/-1;
      margin: 12px auto 0;
      padding: 10px 28px;
      border: 2px solid var(--gold);
      border-radius: 8px;
      background: linear-gradient(180deg, rgba(212, 164, 0, .2), rgba(212, 164, 0, .05));
      color: var(--gold);
      font-family: var(--font-display);
      font-size: 12px;
      text-transform: uppercase;
      letter-spacing: 1px;
      cursor: pointer;
      transition: .15s;
    }

    .craft-btn:hover {
      background: linear-gradient(180deg, rgba(212, 164, 0, .35), rgba(212, 164, 0, .1));
      box-shadow: 0 0 16px var(--gold-glow)
    }

    /* Guild */
    .guild-header {
      display: flex;
      gap: 16px;
      align-items: center;
      padding: 14px;
      background: linear-gradient(135deg, #221710, #1a0f08);
      border: 1px solid var(--border-dim);
      border-radius: 10px;
      margin-bottom: 14px;
    }

    .guild-crest {
      width: 64px;
      height: 64px;
      border: 2px solid var(--border);
      border-radius: 10px;
      background: radial-gradient(circle, rgba(212, 164, 0, .15), transparent);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 28px;
      flex-shrink: 0;
    }

    .guild-info .gname {
      font-family: var(--font-display);
      font-size: 18px;
      color: var(--gold)
    }

    .guild-info .gmaster {
      font-size: 12px;
      color: var(--muted);
      margin-top: 2px
    }

    .guild-info .gcap {
      font-size: 11px;
      color: var(--dim);
      margin-top: 2px;
      font-family: var(--font-mono)
    }

    .member-list {
      display: flex;
      flex-direction: column;
      gap: 6px
    }

    .member-row {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 8px 10px;
      background: linear-gradient(135deg, #1e1510, #160e08);
      border: 1px solid var(--border-dim);
      border-radius: 8px;
    }

    .member-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      flex-shrink: 0
    }

    .member-dot.online {
      background: var(--green);
      box-shadow: 0 0 6px rgba(110, 200, 110, .4)
    }

    .member-dot.offline {
      background: #555
    }

    .member-name {
      flex: 1;
      font-size: 12px
    }

    .member-lvl {
      font-size: 11px;
      color: var(--muted);
      font-family: var(--font-mono)
    }

    .member-rank {
      font-size: 10px;
      color: var(--gold);
      font-family: var(--font-display);
      text-transform: uppercase
    }

    /* Quest Panel */
    .quest-card {
      padding: 12px;
      margin-bottom: 8px;
      background: linear-gradient(135deg, #1e1510, #160e08);
      border: 1px solid var(--border-dim);
      border-radius: 10px;
      border-left: 3px solid var(--gold);
    }

    .quest-card .q-title {
      font-family: var(--font-display);
      font-size: 13px;
      color: var(--text)
    }

    .quest-card .q-desc {
      font-size: 11px;
      color: var(--muted);
      margin-top: 4px;
      line-height: 1.4
    }

    .quest-card .q-progress {
      margin-top: 8px;
      height: 6px;
      background: #1a0f08;
      border-radius: 3px;
      overflow: hidden;
      border: 1px solid var(--border-dim);
    }

    .quest-card .q-progress .q-fill {
      height: 100%;
      background: linear-gradient(90deg, var(--gold), #ffd56a);
      border-radius: 2px
    }

    .quest-card .q-reward {
      font-size: 10px;
      color: var(--gold);
      margin-top: 6px;
      font-family: var(--font-mono)
    }

    /* Upgrade Panel */
    .upgrade-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
      gap: 10px
    }

    .upgrade-card {
      padding: 12px;
      background: linear-gradient(135deg, #1e1710, #160f08);
      border: 1px solid var(--border-dim);
      border-radius: 10px;
      cursor: pointer;
      transition: .15s;
    }

    .upgrade-card:hover {
      border-color: var(--border2)
    }

    .upgrade-card .u-name {
      font-family: var(--font-display);
      font-size: 12px;
      color: var(--text)
    }

    .upgrade-card .u-level {
      font-size: 11px;
      color: var(--gold);
      margin-top: 2px;
      font-family: var(--font-mono)
    }

    .upgrade-card .u-desc {
      font-size: 10px;
      color: var(--muted);
      margin-top: 4px;
      line-height: 1.3
    }

    .upgrade-card .u-cost {
      margin-top: 8px;
      font-size: 10px;
      color: var(--orange);
      display: flex;
      align-items: center;
      gap: 4px;
    }

    /* Tooltip */
    .tooltip {
      position: fixed;
      z-index: 9999;
      pointer-events: none;
      display: none;
      width: 260px;
      max-width: calc(100vw - 20px);
      background: linear-gradient(135deg, #221710, #1a0f08);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 10px;
      box-shadow: 0 12px 32px rgba(0, 0, 0, .6);
    }

    .tooltip.show {
      display: block
    }

    .tooltip .tt-name {
      font-family: var(--font-display);
      font-size: 13px;
      color: var(--gold)
    }

    .tooltip .tt-type {
      font-size: 9px;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: .8px;
      margin-top: 2px
    }

    .tooltip .tt-desc {
      font-size: 11px;
      color: var(--text);
      line-height: 1.4;
      margin-top: 8px;
      padding-top: 6px;
      border-top: 1px solid var(--border-dim)
    }

    /* Responsive */
    @media(max-width:1100px) {
      .left-col {
        display: none
      }

      .right-col {
        display: none
      }
    }

    @media(max-width:700px) {
      .tab-btn {
        padding: 8px 8px;
        font-size: 8px;
        letter-spacing: 0
      }
    }

    /* ═══ ENTITY SYSTEM ═══ */
    .entity-selector-bar {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 6px 16px;
      background: linear-gradient(90deg, #0f0905, #160f08, #0f0905);
      border-bottom: 1px solid var(--border-dim);
      flex-shrink: 0;
      overflow-x: auto;
    }

    .entity-selector-bar .es-label {
      font-size: 9px;
      color: var(--dim);
      text-transform: uppercase;
      letter-spacing: 1.5px;
      font-family: var(--font-display);
      white-space: nowrap;
      flex-shrink: 0;
    }

    .entity-chip {
      display: flex;
      align-items: center;
      gap: 5px;
      padding: 4px 10px;
      border: 1px solid var(--border-dim);
      border-radius: 6px;
      background: linear-gradient(135deg, #1e140e, #140c06);
      cursor: pointer;
      transition: .15s;
      flex-shrink: 0;
      font-size: 11px;
    }

    .entity-chip:hover {
      border-color: var(--border2)
    }

    .entity-chip.active {
      border-color: var(--gold);
      background: rgba(212, 164, 0, .08)
    }

    .entity-chip .ec-emoji {
      font-size: 15px
    }

    .entity-chip .ec-name {
      font-family: var(--font-display);
      font-size: 10px;
      color: var(--text);
      font-weight: 700
    }

    .entity-chip .ec-lvl {
      font-size: 9px;
      color: var(--muted)
    }

    .entity-chip .ec-type {
      font-size: 8px;
      font-weight: 800;
      padding: 1px 5px;
      border-radius: 99px;
      border: 1px solid;
      text-transform: uppercase;
      letter-spacing: .3px;
    }

    .ec-type.player {
      color: #6ec96e;
      border-color: #6ec96e50;
      background: #6ec96e12
    }

    .ec-type.ally {
      color: #5a9ad8;
      border-color: #5a9ad850;
      background: #5a9ad812
    }

    .ec-type.enemy {
      color: #d45050;
      border-color: #d4505050;
      background: #d4505012
    }

    /* Right col mode switcher */
    .rcol-mode-bar {
      display: flex;
      gap: 0;
      border-bottom: 1px solid var(--border-dim);
      flex-shrink: 0;
    }

    .rcol-mode-btn {
      flex: 1;
      padding: 7px 4px;
      border: 0;
      background: transparent;
      color: var(--muted);
      cursor: pointer;
      font-family: var(--font-display);
      font-size: 9px;
      text-transform: uppercase;
      letter-spacing: .8px;
      border-bottom: 2px solid transparent;
      transition: .15s;
    }

    .rcol-mode-btn:hover {
      color: var(--text)
    }

    .rcol-mode-btn.active {
      color: var(--gold);
      border-bottom-color: var(--gold);
      background: rgba(212, 164, 0, .05)
    }
  </style>
</head>

<body>
  <div class="app">

    <!-- TOP BAR -->
    <header class="top-bar">
      <div class="logo">
        <h1>⚔ Grudge Warlords</h1>
        <span class="sub" id="topbar-sub">Main Panel</span>
      </div>
      <div class="player-info">
        <div class="resource-bars">
          <div class="res-bar">
            <div class="fill hp" id="tb-hp"></div><span class="lbl" id="tb-hp-lbl">HP —</span>
          </div>
          <div class="res-bar">
            <div class="fill mp" id="tb-mp"></div><span class="lbl" id="tb-mp-lbl">MP —</span>
          </div>
          <div class="res-bar">
            <div class="fill sp" id="tb-sp"></div><span class="lbl" id="tb-sp-lbl">SP —</span>
          </div>
        </div>
        <span class="name" id="tb-name">—</span>
        <span class="lvl" id="tb-lvl">Select a unit</span>
      </div>
    </header>

    <!-- ENTITY SELECTOR BAR -->
    <div class="entity-selector-bar" id="entitySelectorBar">
      <span class="es-label">Viewing:</span>
    </div>

    <div class="main-body">

      <!-- LEFT: STATS -->
      <aside class="left-col">
        <div class="char-preview">
          <div class="char-preview" id="charPreview">
            <div class="char-silhouette" id="charSilhouette">Character<br>Preview</div>
            <div id="charRaceBadge" style="position:absolute;bottom:6px;left:8px;width:36px;height:36px;display:none">
            </div>
            <div id="charFactionBadge"
              style="position:absolute;bottom:6px;right:8px;width:36px;height:36px;display:none"></div>
          </div>
          <div class="stat-section" id="sidebarAttrs"></div>
          <div class="stat-section" id="sidebarCombat"></div>
          <div class="stat-section" id="sidebarProgression"></div>
          <div class="stat-section" id="sidebarBuild"></div>
      </aside>

      <!-- CENTER: TABBED CONTENT -->
      <main class="center-col">
        <nav class="tab-strip" id="tabStrip"></nav>
        <div class="content-area" id="contentArea"></div>
      </main>

      <!-- RIGHT: INVENTORY / SKILLS -->
      <aside class="right-col">
        <div class="rcol-mode-bar">
          <button class="rcol-mode-btn active" id="rcol-inv-btn" onclick="setRcolMode('inv')">🎒 Inventory</button>
          <button class="rcol-mode-btn" id="rcol-sk-btn" onclick="setRcolMode('skills')">⚡ Skills</button>
        </div>
        <!-- Inventory mode -->
        <div id="rcol-inv-panel" style="display:flex;flex-direction:column;flex:1;min-height:0;">
          <div class="inv-header">
            <h3 id="inv-entity-name">Inventory</h3>
            <span class="gold-display" id="inv-gold-display">⚜ —</span>
          </div>
          <div class="inv-grid" id="invGrid"></div>
          <div class="trash-zone">
            <div class="trash-slot">🗑</div>
            <span>Drop items here to destroy</span>
          </div>
        </div>
        <!-- Skills mode -->
        <div id="rcol-sk-panel"
          style="display:none;flex-direction:column;flex:1;min-height:0;overflow-y:auto;padding:10px;">
          <div
            style="font-size:9px;color:var(--dim);text-transform:uppercase;letter-spacing:1.5px;font-family:var(--font-display);margin-bottom:8px;">
            9 Skill Slots</div>
          <div id="rcol-skill-grid" style="display:grid;grid-template-columns:repeat(3,1fr);gap:8px;"></div>
        </div>
      </aside>
    </div>

    <!-- BOTTOM: HOTBAR -->
    <footer class="bottom-bar">
      <div class="hotbar" id="hotbar"></div>
    </footer>
  </div>

  <div class="tooltip" id="tooltip"></div>

  <script>
    /* ═══════════════════════════════════════════════════════════
       GRUDGE WARLORDS — MAIN PANEL ENGINE (8-attribute stats system)
       Data source: https://molochdagod.github.io/ObjectStore/
       ═══════════════════════════════════════════════════════════ */

    const CDN = 'https://molochdagod.github.io/ObjectStore';
    const ICON = p => CDN + '/' + String(p).replace(/^\//, '');

    // ═══ ARENA ASSETS (grudge-arena public/ served by Vite dev server) ═══
    const ARENA_BASE = 'http://localhost:5173';
    const AIMG = name => ARENA_BASE + '/' + encodeURIComponent(name);

    const RACE_IMG = {
      Human: AIMG('Human Emblem.png'),
      Elf: AIMG('Elf Emblem.png'),
      Dwarf: AIMG('Dwarf Emblem.png'),
      Orc: AIMG('Orc Emblem.png'),
      Undead: AIMG('Undead Emblem.png'),
      Worge: AIMG('Worge Emblem.png'),
    };

    const FACTION_IMG = {
      Barbarian: AIMG('Barbarian Emblem.png'),
      Crusade: AIMG('Crusade Emblem.png'),
      Fabled: AIMG('Fabled Emblem.png'),
      Legion: AIMG('Legion Emblem.png'),
    };

    const CLASS_IMG = {
      Warrior: AIMG('magicstudio-art (10).png'),
      Ranger: AIMG('magicstudio-art (12).png'),
      Mage: AIMG('magicstudio-art (14).png'),
    };

    // ═══ ENTITY DATA SYSTEM ═══
    const MP_ENTITIES = {
      player: {
        id: 'player', name: 'Racalvin', level: 42, class: 'Warrior', race: 'Human', faction: 'Crusade', type: 'player', emoji: '⚔',
        hp: [780, 1000], mp: [310, 500], sp: [91, 100],
        attrPoints: { Strength: 28, Intellect: 8, Vitality: 32, Dexterity: 18, Endurance: 24, Wisdom: 10, Agility: 18, Tactics: 22 },
        skills: [
          { name: 'Power Strike', icon: '⚔', desc: 'Overhead strike dealing 150% damage.', active: true },
          { name: 'Shield Bash', icon: '🛡', desc: 'Bash that stuns target for 1.5s.', active: true },
          { name: 'War Cry', icon: '📯', desc: 'AoE taunt + -15% enemy damage for 4s.', active: true },
          { name: 'Cleave', icon: '💥', desc: 'Wide arc hitting all nearby enemies.', active: true },
          { name: 'Berserker', icon: '🔥', desc: '+25% attack speed below 30% HP.', active: false },
          { name: 'Execute', icon: '💀', desc: '200% damage vs targets below 20% HP.', active: false },
          { name: 'Parry', icon: '🔄', desc: 'Block + counter for 50% damage.', active: false },
          { name: 'Rend', icon: '🩸', desc: 'Bleed DoT for 4s on hit.', active: false },
          { name: 'Unbreakable', icon: '🏰', desc: 'CC immunity for 6s. 45s cooldown.', active: false }
        ],
        inventory: [
          { n: 'Bloodfeud Blade', e: '⚔️', path: 'icons/weapons/Sword_12.png', rarity: 'unique', qty: 1 },
          { n: 'War Helm', e: '👒', path: 'icons/armor_full/Helmet_02.png', rarity: 'rare', qty: 1 },
          { n: 'Ashen Cuirass', e: '🥋', path: 'icons/armor_full/Chest_09.png', rarity: 'epic', qty: 1 },
          { n: 'March Greaves', e: '🥾', path: 'icons/armor_full/Boots_11.png', rarity: 'rare', qty: 1 },
          { n: 'Bulwark Plate', e: '🛡️', path: 'icons/armor_full/Shield_04.png', rarity: 'epic', qty: 1 },
          { n: 'Siege Tonic', e: '🧪', path: 'icons/potions/Potion_07.png', rarity: 'common', qty: 12 },
          { n: 'Field Ration', e: '🍖', path: 'icons/food/Food_03.png', rarity: 'common', qty: 24 },
          { n: 'Iron Ingot', e: '⛓️', path: 'icons/materials/Ingot_01.png', rarity: 'common', qty: 42 },
          { n: 'Blood Crystal', e: '💎', path: 'icons/materials/Gem_04.png', rarity: 'rare', qty: 7 },
          { n: 'Soul Shard', e: '💠', path: 'icons/materials/Gem_12.png', rarity: 'epic', qty: 3 }
        ],
        gold: 22578
      },
      shadowfang: {
        id: 'shadowfang', name: 'Shadowfang', level: 38, class: 'Ranger', race: 'Elf', faction: 'Fabled', type: 'ally', emoji: '🏹',
        hp: [650, 800], mp: [400, 600], sp: [85, 100],
        attrPoints: { Strength: 12, Intellect: 15, Vitality: 22, Dexterity: 35, Endurance: 18, Wisdom: 20, Agility: 30, Tactics: 8 },
        skills: [
          { name: 'Multi-Shot', icon: '🏹', desc: 'Fire 3 arrows in a cone.', active: true },
          { name: 'Shadow Step', icon: '👤', desc: 'Teleport behind target + 3s stealth.', active: true },
          { name: 'Poison Arrow', icon: '☠', desc: '30% chance to apply venom DoT for 8s.', active: true },
          { name: 'Eagle Eye', icon: '👁', desc: '+5% accuracy and +10% crit range.', active: true },
          { name: 'Rapid Fire', icon: '💨', desc: '+6% attack speed with bows.', active: false },
          { name: 'Camouflage', icon: '🍃', desc: 'Full stealth for 10s.', active: false },
          { name: '', icon: '', desc: '', active: false },
          { name: '', icon: '', desc: '', active: false },
          { name: 'Deadeye', icon: '👑', desc: '+20% crit damage ascendancy.', active: false }
        ],
        inventory: [
          { n: 'Shadowflight Bow', e: '🏹', path: 'icons/weapons/Bow_08.png', rarity: 'unique', qty: 1 },
          { n: 'Poison Flask', e: '☠️', path: 'icons/potions/Potion_07.png', rarity: 'uncommon', qty: 8 },
          { n: 'Smoke Bomb', e: '💨', path: 'icons/items/Flare_01.png', rarity: 'uncommon', qty: 5 },
          { n: 'Feathered Arrows', e: '🪶', path: 'icons/materials/Ingot_01.png', rarity: 'common', qty: 60 }
        ],
        gold: 9120
      },
      slime: {
        id: 'slime', name: 'Greater Slime', level: 28, class: 'Beast', race: 'Slime', type: 'enemy', emoji: '🟢',
        hp: [450, 450], mp: [0, 0], sp: [60, 100],
        attrPoints: { Strength: 18, Intellect: 2, Vitality: 40, Dexterity: 5, Endurance: 30, Wisdom: 0, Agility: 8, Tactics: 0 },
        skills: [
          { name: 'Acid Spit', icon: '🧪', desc: 'Ranged acid projectile. Applies burn.', active: true },
          { name: 'Body Slam', icon: '💥', desc: 'Charges and slams. Knocks back targets.', active: true },
          { name: 'Split', icon: '⚡', desc: 'Splits into 2 smaller slimes at 25% HP.', active: false },
          { name: '', icon: '', desc: '', active: false }, { name: '', icon: '', desc: '', active: false },
          { name: '', icon: '', desc: '', active: false }, { name: '', icon: '', desc: '', active: false },
          { name: '', icon: '', desc: '', active: false }, { name: '', icon: '', desc: '', active: false }
        ],
        inventory: [
          { n: 'Slime Core', e: '💚', path: 'icons/materials/Gem_04.png', rarity: 'uncommon', qty: 1 },
          { n: 'Acid Vial', e: '🧪', path: 'icons/potions/Potion_07.png', rarity: 'common', qty: 2 }
        ],
        gold: 0
      }
    };

    const MP_ENTITY_ORDER = ['player', 'shadowfang', 'slime'];
    let activeEntityId = 'player';
    function getActiveEntity() { return MP_ENTITIES[activeEntityId]; }

    // Right column mode
    let rcolMode = 'inv';
    function setRcolMode(mode) {
      rcolMode = mode;
      document.getElementById('rcol-inv-panel').style.display = mode === 'inv' ? 'flex' : 'none';
      document.getElementById('rcol-sk-panel').style.display = mode === 'skills' ? 'flex' : 'none';
      document.getElementById('rcol-inv-btn').classList.toggle('active', mode === 'inv');
      document.getElementById('rcol-sk-btn').classList.toggle('active', mode === 'skills');
      if (mode === 'skills') _buildRcolSkills();
    }

    function _buildRcolSkills() {
      const e = getActiveEntity(); const grid = document.getElementById('rcol-skill-grid'); if (!grid) return;
      grid.innerHTML = (e.skills || []).map((sk, i) => {
        const filled = !!sk.name; const act = sk.active;
        return `<div onclick="_rcolSkillClick(${i},this)" title="${sk.name || 'Empty'}\n${sk.desc || ''}" style="
      aspect-ratio:1;background:linear-gradient(135deg,${act ? '#1a2808,#122008' : '#1a0f08,#0f0805'});
      border:2px solid ${act ? '#3a5820' : '#2a1a0a'};border-radius:8px;
      display:flex;flex-direction:column;align-items:center;justify-content:center;
      cursor:pointer;transition:.15s;position:relative;overflow:hidden;
      ${act ? 'box-shadow:0 0 8px rgba(58,88,32,.4);' : ''}">
      <span style="position:absolute;top:2px;left:4px;font-size:8px;color:#555;font-family:var(--font-mono)">${i + 1}</span>
      ${filled ? `<span style="font-size:22px;line-height:1">${sk.icon}</span><span style="font-size:7px;color:#888;text-align:center;font-family:var(--font-display);text-transform:uppercase;letter-spacing:.3px;padding:0 3px;line-height:1.2;margin-top:2px">${sk.name}</span>` : ''}
    </div>`;
      }).join('');
    }

    function _rcolSkillClick(i, el) {
      document.querySelectorAll('#rcol-skill-grid > div').forEach(s => s.style.outline = '');
      el.style.outline = '2px solid var(--gold)';
    }

    function selectEntity(id) {
      if (!MP_ENTITIES[id]) return;
      activeEntityId = id;
      const e = getActiveEntity();
      // Sync attributePoints to selected entity
      attributePoints = Object.assign({}, e.attrPoints);
      // Update top bar
      _updateTopBar();
      // Update entity selector chips
      _buildEntitySelector();
      // Refresh all
      buildInventory();
      rebuildSidebar();
      if (rcolMode === 'skills') _buildRcolSkills();
      if (activeTab) renderContent();
    }

    function _updateTopBar() {
      const e = getActiveEntity();
      document.getElementById('tb-name').textContent = e.name;
      document.getElementById('tb-lvl').textContent = `Lv.${e.level} ${e.race} ${e.class}`;
      document.getElementById('topbar-sub').textContent = `${e.emoji} ${e.type === 'enemy' ? 'Enemy' : 'Unit'} Panel`;
      const hpP = (e.hp[0] / Math.max(e.hp[1], 1) * 100).toFixed(1);
      const mpP = (e.mp[0] / Math.max(e.mp[1], 1) * 100).toFixed(1);
      const spP = (e.sp[0] / Math.max(e.sp[1], 1) * 100).toFixed(1);
      document.getElementById('tb-hp').style.width = hpP + '%';
      document.getElementById('tb-mp').style.width = mpP + '%';
      document.getElementById('tb-sp').style.width = spP + '%';
      document.getElementById('tb-hp-lbl').textContent = `HP ${e.hp[0]}/${e.hp[1]}`;
      document.getElementById('tb-mp-lbl').textContent = `MP ${e.mp[0]}/${e.mp[1]}`;
      document.getElementById('tb-sp-lbl').textContent = `SP ${e.sp[0]}/${e.sp[1]}`;
    }

    function _buildEntitySelector() {
      const bar = document.getElementById('entitySelectorBar'); if (!bar) return;
      bar.innerHTML = `<span class="es-label">Viewing:</span>` +
        MP_ENTITY_ORDER.map(id => {
          const e = MP_ENTITIES[id];
          const raceImgUrl = RACE_IMG[e.race];
          const raceHtml = raceImgUrl
            ? `<img src="${raceImgUrl}" alt="${e.race}" style="width:22px;height:22px;object-fit:contain;flex-shrink:0" title="${e.race}" onerror="this.outerHTML='<span class=ec-emoji>${e.emoji}</span>'">`
            : `<span class="ec-emoji">${e.emoji}</span>`;
          return `<div class="entity-chip ${id === activeEntityId ? 'active' : ''}" onclick="selectEntity('${id}')">

      comboCooldownRed: 'Combo CDR'
    };

    const PCT_STATS = new Set(['attackSpeed', 'accuracy', 'criticalChance', 'criticalDamage', 'block', 'blockEffect', 'evasion', 'resistance', 'drainHealth', 'damageReduction', 'movementSpeed', 'cooldownReduction', 'armorPenetration', 'blockPenetration', 'ccResistance', 'spellblock', 'defenseBreak', 'spellAccuracy', 'cdrResist', 'defenseBreakResist', 'bleedResist', 'statusEffect', 'dodge', 'reflexTime', 'criticalEvasion', 'fallDamage', 'comboCooldownRed', 'stagger', 'abilityCost']);

    // Sample build (spends all 160 points, balanced Warrior)
    let attributePoints = { Strength: 28, Intellect: 8, Vitality: 32, Dexterity: 18, Endurance: 24, Wisdom: 10, Agility: 18, Tactics: 22 };

    function totalPointsSpent() { return Object.values(attributePoints).reduce((a, b) => a + b, 0); }
    function availablePoints() { return TOTAL_POINTS - totalPointsSpent(); }

    function calculateStats() {
      const s = Object.assign({}, BASE_STATS);
      for (const [attr, pts] of Object.entries(attributePoints)) {
        const def = ATTR_DEFS[attr];
        if (!def || pts <= 0) continue;
        for (const [key, per] of Object.entries(def.gains)) {
          if (s[key] !== undefined) s[key] += per * pts;
        }
      }
      const tac = attributePoints.Tactics || 0;
      if (tac > 0) {
        const mult = 1 + (tac * 0.5 / 100);
        for (const key of Object.keys(s)) {
          if (key !== 'health' && key !== 'mana' && key !== 'stamina') s[key] *= mult;
        }
      }
      return s;
    }

    function calculateCombatPower(s) {
      const ehp = s.health * (1 + s.defense / 100) * (1 + s.resistance / 100);
      const dps = (s.damage + 10) * (1 + (s.criticalChance / 100) * (s.criticalDamage / 100)) * (1 + s.attackSpeed / 100);
      const util = s.cooldownReduction * 2 + s.manaRegen * 10 + s.movementSpeed * 2;
      return Math.floor(ehp * 0.4 + dps * 2.5 + util * 5);
    }

    function buildRating(cp) {
      if (cp > 5400) return { letter: 'S+', color: '#fbbf24' };
      if (cp > 4800) return { letter: 'S', color: '#fbbf24' };
      if (cp > 4200) return { letter: 'A', color: '#a855f7' };
      if (cp > 3600) return { letter: 'B', color: '#6ec96e' };
      if (cp > 3000) return { letter: 'C', color: '#f5e2c1' };
      if (cp > 2400) return { letter: 'D', color: '#d89040' };
      return { letter: 'F', color: '#d45050' };
    }

    function buildTier(cp) {
      if (cp > 5400) return { name: 'Legendary', color: '#89f7fe' };
      if (cp > 4800) return { name: 'Warlord', color: '#f97316' };
      if (cp > 4200) return { name: 'Epic', color: '#a855f7' };
      if (cp > 3000) return { name: 'Hero', color: '#3b82f6' };
      return { name: 'Normal', color: '#9ca3af' };

      </div>
    </div>
    <div class="section-title">Members</div>
    <div class="member-list">
      ${GUILD_MEMBERS.map(m => `
        <div class="member-row">
          <div class="member-dot ${m.online ? 'online' : 'offline'}"></div>
          <span class="member-name">${m.name}</span>
          <span class="member-lvl">Lv.${m.level}</span>
          <span class="member-rank">${m.rank}</span>
        </div>
      `).join('')}
    </div>
  `;
    }

    // ═══ INVENTORY — entity-aware ═══
    function buildInventory() {
      const grid = document.getElementById('invGrid'); if (!grid) return;
      const e = getActiveEntity();
      const items = e.inventory || INVENTORY_ITEMS;
      // Update header
      const nameEl = document.getElementById('inv-entity-name');
      const goldEl = document.getElementById('inv-gold-display');
      if (nameEl) nameEl.textContent = e.name + ' — Inventory';
      if (goldEl) goldEl.textContent = '⚜ ' + (e.gold || 0).toLocaleString();
      const slots = 30;
      let html = '';
      for (let i = 0; i < slots; i++) {
        const item = items[i];
        if (item) {
          const rcol = RARITY_COLOR[item.rarity] || 'var(--border-dim)';
          html += `<div class="inv-cell filled" title="${item.n} (${item.rarity})" style="border-color:${rcol}66;box-shadow:inset 0 0 8px ${rcol}22">
        <div style="width:100%;height:100%;display:flex;align-items:center;justify-content:center">${iconHTML(item.path, item.e, 36)}</div>
        ${item.qty > 1 ? `<span class="qty">${item.qty}</span>` : ''}
      </div>`;
        } else {
          html += `<div class="inv-cell"></div>`;
        }
      }
      grid.innerHTML = html;
    }

    // ═══ HOTBAR (4 skills + empty + 3 consumables) ═══
    function buildHotbar() {
      const bar = document.getElementById('hotbar');
      bar.innerHTML = HOTBAR.map(h => {
        const inner = h.path ? `<div style="width:32px;height:32px;display:flex;align-items:center;justify-content:center">${iconHTML(h.path, h.emoji, 32)}</div>` : '';
        return `<div class="hb-slot" title="${h.label}"><span class="key">${h.key}</span>${inner}</div>`;
      }).join('');
    }

    // ═══ INIT ═══
    _buildEntitySelector();
    selectEntity('player'); // loads first entity, sets attributePoints, updates top bar
    buildTabs();
    renderContent();
    buildInventory();
    buildHotbar();
    rebuildSidebar();
  </script>
</body>

</html>
